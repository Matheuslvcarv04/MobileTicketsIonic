<ion-content class="container">

  <div class="header">
    <h1>🖥️ Painel de Atendimento</h1>
  </div>

  <ion-button
    expand="block"
    (click)="chamar()"
  >
    Chamar Próxima Senha
  </ion-button>

  <div
    class="card-senha"
    *ngIf="senhaAtual"
  >
    <h2>Chamando</h2>
    <h1 class="numero">
      {{ senhaAtual.numero }}
    </h1>
    <p>
      {{ senhaAtual.tipo }}
    </p>
  </div>

</ion-content>
